#:schema https://mise.jdx.dev/schema/mise.json

# gdocs-sync — Apps Script project managed via clasp.
# clasp is a repo-specific node CLI; nushell/gh/jq/fnox are GLOBAL tools.
# All secrets/config resolve through fnox (see fnox.toml) — never committed.

[tools]
node = "lts"
"npm:@google/clasp" = "latest"

# ── auth (one-time per machine) ──────────────────────────────────────────────

[tasks."gdoc:login"]
description = "Interactive Google OAuth (writes ~/.clasprc.json). Run once, then gdoc:auth-save."
run = "clasp login"

[tasks."gdoc:auth-save"]
description = "Capture ~/.clasprc.json into the keychain (after gdoc:login)"
run = '''
test -f "$HOME/.clasprc.json" || { echo "no ~/.clasprc.json — run gdoc:login first"; exit 1; }
fnox set -p keychain GDOCS_SYNC_CLASP_RC "$(cat "$HOME/.clasprc.json")"
echo "saved clasp credentials to keychain"
'''

[tasks."gdoc:auth-restore"]
description = "Materialise ~/.clasprc.json from the keychain so clasp can run"
run = 'fnox get GDOCS_SYNC_CLASP_RC > "$HOME/.clasprc.json" && echo "restored ~/.clasprc.json"'

[tasks."gdoc:link"]
description = "Regenerate .clasp.json from the Script ID in the keychain (after a fresh clone)"
run = '''
id="$(fnox get GDOCS_SYNC_SCRIPT_ID)"
test -n "$id" || { echo "no Script ID in fnox (GDOCS_SYNC_SCRIPT_ID)"; exit 1; }
printf '{\n  "scriptId": "%s",\n  "rootDir": "src"\n}\n' "$id" > .clasp.json
echo "wrote .clasp.json"
'''

# ── develop & deploy ─────────────────────────────────────────────────────────

[tasks."gdoc:push"]
description = "Push local src/ up to Apps Script"
depends = ["gdoc:auth-restore"]
run = "clasp push -f"

[tasks."gdoc:dev"]
description = "Watch src/ and auto-push on every save"
depends = ["gdoc:auth-restore"]
run = "clasp push --watch"

[tasks."gdoc:status"]
description = "Preview which files would be pushed"
run = "clasp status"

[tasks."gdoc:pull"]
description = "Pull the remote project into src/"
depends = ["gdoc:auth-restore"]
run = "clasp pull"

[tasks."gdoc:deploy"]
description = "Update the web-app deployment to the latest pushed code (same URL)"
depends = ["gdoc:auth-restore"]
run = '''
id="$(fnox get GDOCS_SYNC_DEPLOY_ID)"
test -n "$id" || { echo "no deploy id in fnox (GDOCS_SYNC_DEPLOY_ID)"; exit 1; }
clasp redeploy "$id"
'''

[tasks."gdoc:open"]
description = "Open the Apps Script editor in the browser"
depends = ["gdoc:auth-restore"]
run = "clasp open-script"

# ── run ──────────────────────────────────────────────────────────────────────

[tasks."gdoc:run"]
description = "Trigger syncAll headlessly via the web app (token-gated)"
run = '''
url="$(fnox get GDOCS_SYNC_WEBAPP_URL)"
tok="$(fnox get GDOCS_SYNC_API_TOKEN)"
test -n "$url" && test -n "$tok" || { echo "missing URL/token in fnox — run setupApi in the editor first"; exit 1; }
echo "triggering syncAll…"
curl -sL "$url?token=$tok&fn=sync"; echo
'''

[tasks."gdoc:add"]
description = "Create a builder's translated copy: gdoc:add \"<Builder>\" [--lang th] [--email a@b]"
usage = '''
arg "<builder>" help="Builder name"
flag "--lang <lang>" help="Target language" default="th"
flag "--email <email>" help="Builder email" default=""
'''
run = '''
url="$(fnox get GDOCS_SYNC_WEBAPP_URL)"
tok="$(fnox get GDOCS_SYNC_API_TOKEN)"
test -n "$url" && test -n "$tok" || { echo "missing URL/token in fnox"; exit 1; }
echo "creating builder doc…"
curl -sLG "$url" \
  --data-urlencode "token=$tok" --data-urlencode "fn=add" \
  --data-urlencode "builder=$usage_builder" \
  --data-urlencode "lang=$usage_lang" \
  --data-urlencode "email=$usage_email"; echo
'''

[tasks."gdoc:remove"]
description = "Trash a builder's doc and remove its registry row: gdoc:remove \"<Builder>\""
usage = 'arg "<builder>" help="Builder name (exact)"'
run = '''
url="$(fnox get GDOCS_SYNC_WEBAPP_URL)"
tok="$(fnox get GDOCS_SYNC_API_TOKEN)"
test -n "$url" && test -n "$tok" || { echo "missing URL/token in fnox"; exit 1; }
curl -sLG "$url" \
  --data-urlencode "token=$tok" --data-urlencode "fn=remove" \
  --data-urlencode "builder=$usage_builder"; echo
'''

[tasks."gdoc:setup-remote"]
description = "(Re)initialise the registry sheet headlessly via the web app"
run = '''
url="$(fnox get GDOCS_SYNC_WEBAPP_URL)"
tok="$(fnox get GDOCS_SYNC_API_TOKEN)"
test -n "$url" && test -n "$tok" || { echo "missing URL/token in fnox — run setupApi in the editor first"; exit 1; }
curl -sL "$url?token=$tok&fn=setup"; echo
'''

[tasks."gdoc:state"]
description = "Read the registry state (per-row target link + last_synced + status) as JSON"
run = '''
url="$(fnox get GDOCS_SYNC_WEBAPP_URL)"
tok="$(fnox get GDOCS_SYNC_API_TOKEN)"
test -n "$url" && test -n "$tok" || { echo "missing URL/token in fnox"; exit 1; }
curl -sL "$url?token=$tok&fn=status"; echo
'''

[tasks."gdoc:log"]
description = "Show the run log (timestamped progress of the last/ongoing operation)"
run = '''
url="$(fnox get GDOCS_SYNC_WEBAPP_URL)"
tok="$(fnox get GDOCS_SYNC_API_TOKEN)"
test -n "$url" && test -n "$tok" || { echo "missing URL/token in fnox"; exit 1; }
curl -sL "$url?token=$tok&fn=log"; echo
'''

# ── info ─────────────────────────────────────────────────────────────────────

[tasks."gdoc:urls"]
description = "Print the live URLs (registry sheet, editor, executions, web app)"
run = '''
ID="$(fnox get GDOCS_SYNC_SCRIPT_ID 2>/dev/null || true)"
REG="$(fnox get GDOCS_SYNC_REGISTRY_URL 2>/dev/null || true)"
WEB="$(fnox get GDOCS_SYNC_WEBAPP_URL 2>/dev/null || true)"
[ -n "$REG" ] && echo "Registry sheet : $REG"
[ -n "$ID" ]  && echo "Apps Script    : https://script.google.com/home/projects/$ID/edit"
[ -n "$ID" ]  && echo "Executions     : https://script.google.com/home/projects/$ID/executions"
[ -n "$WEB" ] && echo "Web app        : $WEB"
'''

# ── clasp MCP server (registered in ~/.claude.json as 'clasp') ───────────────

[tasks."mcp:serve"]
description = "Run clasp's MCP server over stdio"
run = "clasp start-mcp-server"
