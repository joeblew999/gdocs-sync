#:schema https://mise.jdx.dev/schema/mise.json

# gdocs-sync — Apps Script project managed via clasp.
# Tools are repo-specific (clasp is a node CLI). nushell/gh/jq/fnox are GLOBAL.
# Secrets resolve through fnox (see fnox.toml): the clasp OAuth credential and the
# Apps Script Script ID live in the keychain, never in committed files.

[tools]
node = "lts"
"npm:@google/clasp" = "latest"

# ── one-time auth bootstrap ──────────────────────────────────────────────────

[tasks."gdoc:onboard"]
description = "Guided setup: prompts you through Script ID + clasp login, stores secrets in fnox, pushes"
run = "nu scripts/onboard.nu"

[tasks."gdoc:login"]
description = "Interactive Google OAuth (writes ~/.clasprc.json). Run once, then gdoc:auth-save."
run = "clasp login"

[tasks."gdoc:auth-save"]
description = "Capture ~/.clasprc.json into the keychain via fnox (after gdoc:login)"
run = '''
test -f "$HOME/.clasprc.json" || { echo "no ~/.clasprc.json — run gdoc:login first"; exit 1; }
fnox set -p keychain GDOCS_SYNC_CLASP_RC "$(cat "$HOME/.clasprc.json")"
echo "saved clasp credentials to keychain (GDOCS_SYNC_CLASP_RC)"
'''

[tasks."gdoc:auth-restore"]
description = "Materialize ~/.clasprc.json from the keychain so clasp can run"
run = '''
fnox get GDOCS_SYNC_CLASP_RC > "$HOME/.clasprc.json"
echo "restored ~/.clasprc.json from keychain"
'''

[tasks."gdoc:id-set"]
description = "Store the Apps Script Script ID in the keychain (from EN doc → Apps Script → Project Settings)"
run = "fnox set -p keychain GDOCS_SYNC_SCRIPT_ID {{arg(name='script_id')}}"

[tasks."gdoc:link"]
description = "Regenerate .clasp.json from the Script ID in the keychain"
run = '''
id="$(fnox get GDOCS_SYNC_SCRIPT_ID)"
test -n "$id" || { echo "no Script ID — run: mise run gdoc:id-set <id>"; exit 1; }
printf '{\n  "scriptId": "%s",\n  "rootDir": "src"\n}\n' "$id" > .clasp.json
echo "wrote .clasp.json"
'''

# ── deploy / run loop ────────────────────────────────────────────────────────

[tasks."gdoc:push"]
description = "Push local src/ up to the bound Apps Script project"
depends = ["gdoc:auth-restore"]
run = "clasp push -f"

[tasks."gdoc:dev"]
description = "Watch src/ and auto-push to Apps Script on every save (tight dev loop)"
depends = ["gdoc:auth-restore"]
run = "clasp push --watch"

[tasks."gdoc:status"]
description = "Preview which files would be pushed (no upload)"
run = "clasp status"

[tasks."gdoc:pull"]
description = "Pull the remote Apps Script project down into src/"
depends = ["gdoc:auth-restore"]
run = "clasp pull"

[tasks."gdoc:open"]
description = "Open the Apps Script project in the browser"
depends = ["gdoc:auth-restore"]
run = "clasp open"

[tasks."gdoc:logs"]
description = "Tail execution logs from the Apps Script project"
depends = ["gdoc:auth-restore"]
run = "clasp logs --watch"

# ── clasp MCP server (for Claude sessions) ───────────────────────────────────

[tasks."mcp:serve"]
description = "Run clasp's MCP server over stdio (registered in ~/.claude.json as the 'clasp' server)"
run = "clasp start-mcp-server"

# ── links / watch it sync ────────────────────────────────────────────────────

[tasks."gdoc:urls"]
description = "Print the live URLs (Apps Script console, executions, triggers, docs)"
run = '''
EN=1-p_yr0CXLOrK8IsabGA9p6PQhh8d9vTqqy4ihSK0IjM
TH=17k8fZUvbESDOwASl_3o5q9s6dvR7yFnGXqWzdc0Tc1A
ID="$(fnox get GDOCS_SYNC_SCRIPT_ID 2>/dev/null || true)"
echo "EN doc        : https://docs.google.com/document/d/$EN/edit"
echo "TH doc        : https://docs.google.com/document/d/$TH/edit"
if [ -n "$ID" ]; then
  echo "Apps Script   : https://script.google.com/home/projects/$ID/edit"
  echo "Executions    : https://script.google.com/home/projects/$ID/executions"
  echo "Triggers      : https://script.google.com/home/projects/$ID/triggers"
else
  echo "(set the Script ID first: mise run gdoc:id-set <id>)"
fi
'''

# ── trigger the sync (full headless control via the web app) ─────────────────

[tasks."gdoc:run"]
description = "Trigger syncAll via the web app (token-gated; no GCP setup needed)"
run = '''
url="$(fnox get GDOCS_SYNC_WEBAPP_URL)"
tok="$(fnox get GDOCS_SYNC_API_TOKEN)"
test -n "$url" && test -n "$tok" || { echo "missing URL/token — run setupApi in the editor, then store them in fnox"; exit 1; }
echo "triggering syncAll…"
curl -sL "$url?token=$tok&fn=sync"; echo
'''

# ── CLI run route (alternative; needs ONBOARDING.md GCP project + OAuth creds) ─

[tasks."gdoc:sync"]
description = "Run syncAll INSIDE Apps Script via clasp run (requires clasp run onboarding)"
depends = ["gdoc:auth-restore"]
run = "clasp run syncAll"
